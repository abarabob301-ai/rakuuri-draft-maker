name: Unpack source

on:
  push:
    paths:
      - '.bootstrap/source-lite.zip.b64.part*'
      - '.github/workflows/unpack-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild archive
        run: |
          cat .bootstrap/source-lite.zip.b64.part* > source.zip.b64
          base64 -d source.zip.b64 > source.zip

      - name: Extract source
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          with zipfile.ZipFile('source.zip') as archive:
              for info in archive.infolist():
                  name = info.filename.replace('\\', '/')
                  if not name or name.endswith('/'):
                      continue
                  target = pathlib.Path(name)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(archive.read(info))
          PY

      - name: Commit unpacked source
        run: |
          rm -rf .bootstrap source.zip source.zip.b64 .github/workflows/unpack-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "chore: unpack project source"
            git push
          fi
